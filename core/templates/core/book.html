<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment - Ntatemoholo Seromo</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00695c;
            margin-bottom: 30px;
        }

        form {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        form label {
            font-weight: bold;
        }

        form input, form select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1em;
        }

        button {
            background-color: #00695c;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #004d40;
        }

        p.success {
            text-align: center;
            color: green;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<h1>Book an Appointment</h1>

{% if message %}
    <p class="success">{{ message }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <label>Name:</label>
    {{ form.name }}

    <label>Email:</label>
    {{ form.email }}

    <label>Service:</label>
    {{ form.service }}

    <label>Date:</label>
    {{ form.date }}

    <button type="submit">Book Appointment</button>
</form>

</body>
</html>
